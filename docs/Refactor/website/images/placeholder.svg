<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <!-- 背景 -->
  <rect width="400" height="300" fill="#f3f4f6"/>
  
  <!-- 装饰性边框 -->
  <rect x="10" y="10" width="380" height="280" 
        fill="none" 
        stroke="#d1d5db" 
        stroke-width="2" 
        stroke-dasharray="10,5"
        rx="8"/>
  
  <!-- 图片图标 -->
  <g transform="translate(160, 90)">
    <!-- 山脉形状 -->
    <path d="M0 80 L30 40 L50 65 L80 20 L100 80 Z" 
          fill="#9ca3af" 
          opacity="0.6"/>
    
    <!-- 太阳/月亮 -->
    <circle cx="70" cy="35" r="12" fill="#d1d5db"/>
    
    <!-- 图片边框 -->
    <rect x="-10" y="10" width="100" height="80" 
          fill="none" 
          stroke="#6b7280" 
          stroke-width="2" 
          rx="4"/>
  </g>
  
  <!-- 主标题 -->
  <text x="200" y="200" 
        font-family="system-ui, -apple-system, sans-serif" 
        font-size="18" 
        font-weight="600" 
        fill="#374151" 
        text-anchor="middle">
    图片占位符
  </text>
  
  <!-- 副标题 -->
  <text x="200" y="225" 
        font-family="system-ui, -apple-system, sans-serif" 
        font-size="14" 
        fill="#6b7280" 
        text-anchor="middle">
    Placeholder Image
  </text>
  
  <!-- 尺寸信息 -->
  <text x="200" y="250" 
        font-family="system-ui, -apple-system, sans-serif" 
        font-size="12" 
        fill="#9ca3af" 
        text-anchor="middle">
    400 × 300 px
  </text>
  
  <!-- 角落装饰 -->
  <circle cx="30" cy="30" r="4" fill="#d1d5db"/>
  <circle cx="370" cy="30" r="4" fill="#d1d5db"/>
  <circle cx="30" cy="270" r="4" fill="#d1d5db"/>
  <circle cx="370" cy="270" r="4" fill="#d1d5db"/>
</svg>
