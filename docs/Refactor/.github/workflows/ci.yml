name: CI

on:
  push:
    branches: [main, master, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:
    inputs:
      debug_enabled:
        description: 'Enable debug mode'
        required: false
        default: 'false'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  PYTHON_VERSION: '3.11'
  LEAN_VERSION: '4.8.0'

jobs:
  # ==========================================
  # Job 1: Markdown Lint Check
  # ==========================================
  markdown-lint:
    name: 📝 Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install markdownlint
        run: npm install -g markdownlint-cli

      - name: Run Markdown Lint
        run: |
          markdownlint '**/*.md' \
            --ignore node_modules \
            --ignore '**/target/**' \
            --ignore '**/.lake/**' \
            --config .markdownlint.json \
            || true

      - name: Upload lint results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: markdown-lint-results
          path: |
            *.md
            */*.md

  # ==========================================
  # Job 2: Link Check
  # ==========================================
  link-check:
    name: 🔗 Link Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check links in Markdown files
        uses: lycheeverse/lychee-action@v1
        with:
          args: |
            --verbose
            --no-progress
            --exclude-path node_modules
            --exclude-path '**/target/**'
            --exclude-path '**/.lake/**'
            './**/*.md'
          fail: false

      - name: Upload link check results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: link-check-results
          path: lychee/out.md

  # ==========================================
  # Job 3: Lean Code Validation
  # ==========================================
  lean-check:
    name: 🔷 Lean 4 Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Lean 4
        uses: leanprover/lean-action@v1
        with:
          test: true
          build: true
          lint: true

      - name: Check Lean files
        run: |
          find . -name "*.lean" -type f | head -20
          lake build || echo "No lakefile found, skipping lake build"

      - name: Upload Lean build artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lean-build-artifacts
          path: |
            .lake/build/
            !.lake/build/lib/temp/

  # ==========================================
  # Job 4: Rust Code Test
  # ==========================================
  rust-test:
    name: 🦀 Rust Tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        rust: [stable, beta]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}-${{ matrix.rust }}

      - name: Check formatting
        run: cargo fmt --all -- --check
        continue-on-error: true

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
        continue-on-error: true

      - name: Run tests
        run: cargo test --all-features --workspace
        continue-on-error: true

      - name: Build release
        run: cargo build --release --all-features
        continue-on-error: true

      - name: Upload Rust artifacts
        uses: actions/upload-artifact@v4
        if: matrix.os == 'ubuntu-latest' && matrix.rust == 'stable'
        with:
          name: rust-build-artifacts
          path: |
            target/release/
            !target/release/build/
            !target/release/deps/
            !target/release/.fingerprint/
            !target/release/incremental/

  # ==========================================
  # Job 5: Python Script Test
  # ==========================================
  python-test:
    name: 🐍 Python Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov black flake8 mypy
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Check formatting with Black
        run: black --check --diff . || true

      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || true
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics || true

      - name: Type check with mypy
        run: mypy . --ignore-missing-imports || true

      - name: Run tests with pytest
        run: pytest --cov=. --cov-report=xml --cov-report=html -v || true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.11'
        with:
          name: python-coverage-report
          path: |
            htmlcov/
            coverage.xml

  # ==========================================
  # Job 6: Generate Report
  # ==========================================
  generate-report:
    name: 📊 Generate Report
    runs-on: ubuntu-latest
    needs: [markdown-lint, link-check, lean-check, rust-test, python-test]
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate summary report
        run: |
          echo "# CI Report Summary" > ci_report.md
          echo "" >> ci_report.md
          echo "## Workflow Status" >> ci_report.md
          echo "" >> ci_report.md
          echo "| Job | Status |" >> ci_report.md
          echo "|-----|--------|" >> ci_report.md
          echo "| Markdown Lint | ${{ needs.markdown-lint.result }} |" >> ci_report.md
          echo "| Link Check | ${{ needs.link-check.result }} |" >> ci_report.md
          echo "| Lean Check | ${{ needs.lean-check.result }} |" >> ci_report.md
          echo "| Rust Test | ${{ needs.rust-test.result }} |" >> ci_report.md
          echo "| Python Test | ${{ needs.python-test.result }} |" >> ci_report.md
          echo "" >> ci_report.md
          echo "## Commit Info" >> ci_report.md
          echo "" >> ci_report.md
          echo "- **Commit**: ${{ github.sha }}" >> ci_report.md
          echo "- **Branch**: ${{ github.ref_name }}" >> ci_report.md
          echo "- **Author**: ${{ github.actor }}" >> ci_report.md
          echo "- **Time**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> ci_report.md
          echo "" >> ci_report.md
          echo "## File Changes" >> ci_report.md
          echo "" >> ci_report.md
          git diff --stat HEAD~1 HEAD || echo "No previous commit to compare" >> ci_report.md

      - name: Upload CI report
        uses: actions/upload-artifact@v4
        with:
          name: ci-report
          path: ci_report.md

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('ci_report.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report
            });

  # ==========================================
  # Job 7: Security Scan
  # ==========================================
  security-scan:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run GitHub Advanced Security
        uses: github/codeql-action/init@v3
        with:
          languages: python, rust

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
