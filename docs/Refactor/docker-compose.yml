# =============================================================================
# FormalScience - Docker Compose Configuration
# =============================================================================
# 提供开发、生产、测试三种环境的容器编排
# 用法:
#   docker-compose up -d          # 启动开发环境
#   docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# =============================================================================

version: "3.9"

# -----------------------------------------------------------------------------
# 通用变量定义
# -----------------------------------------------------------------------------
x-common-variables: &common-variables
  TZ: Asia/Shanghai
  LANG: C.UTF-8
  LC_ALL: C.UTF-8

x-common-deploy: &common-deploy
  resources:
    limits:
      cpus: '4.0'
      memory: 8G
    reservations:
      cpus: '1.0'
      memory: 2G
  restart_policy:
    condition: unless-stopped
    delay: 5s
    max_attempts: 3

# -----------------------------------------------------------------------------
# 服务定义
# -----------------------------------------------------------------------------
services:
  # ---------------------------------------------------------------------------
  # 主开发环境服务
  # ---------------------------------------------------------------------------
  formalscience-dev:
    build:
      context: ../..
      dockerfile: docs/Refactor/Dockerfile
      target: development
    image: formalscience:dev
    container_name: formalscience-dev
    hostname: formalscience-dev
    
    # 环境变量
    environment:
      <<: *common-variables
      ENVIRONMENT: development
      DEBUG: "true"
      LEAN_PATH: /workspace/.lake/packages
      RUST_LOG: debug
      PYTHONPATH: /workspace
    
    # 卷映射
    volumes:
      # 项目源码（读写，便于开发）
      - ../../:/workspace:cached
      # 持久化数据
      - formalscience-data:/workspace/data
      # Lean缓存
      - lean-cache:/root/.cache/lean
      # Cargo缓存
      - cargo-cache:/root/.cargo/registry
      # Python缓存
      - pip-cache:/root/.cache/pip
      # SSH密钥（可选）
      - ~/.ssh:/root/.ssh:ro
      # Git配置（可选）
      - ~/.gitconfig:/root/.gitconfig:ro
    
    # 端口映射
    ports:
      # Jupyter Notebook
      - "8888:8888"
      # 开发服务器
      - "8080:8080"
      # Lean语言服务器
      - "3000:3000"
    
    # 工作目录
    working_dir: /workspace
    
    # 保持容器运行
    stdin_open: true
    tty: true
    
    # 部署配置
    deploy:
      <<: *common-deploy
    
    # 网络
    networks:
      - formalscience-network
    
    # 健康检查
    healthcheck:
      test: ["CMD", "bash", "-c", "lean --version && rustc --version && python3 --version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # 命令
    command: /bin/bash

  # ---------------------------------------------------------------------------
  # 生产环境服务（最小化运行）
  # ---------------------------------------------------------------------------
  formalscience-prod:
    build:
      context: ../..
      dockerfile: docs/Refactor/Dockerfile
      target: production
    image: formalscience:prod
    container_name: formalscience-prod
    hostname: formalscience-prod
    
    environment:
      <<: *common-variables
      ENVIRONMENT: production
      DEBUG: "false"
      RUST_LOG: info
    
    volumes:
      - formalscience-data:/workspace/data:ro
      - formalscience-logs:/workspace/logs
    
    ports:
      - "8080:8080"
    
    deploy:
      <<: *common-deploy
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
    
    networks:
      - formalscience-network
    
    # 生产环境自动重启
    restart: unless-stopped
    
    # 只读根文件系统（安全）
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    
    # 安全选项
    security_opt:
      - no-new-privileges:true
    
    # 能力限制
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID

  # ---------------------------------------------------------------------------
  # Jupyter Notebook 服务
  # ---------------------------------------------------------------------------
  jupyter:
    build:
      context: ../..
      dockerfile: docs/Refactor/Dockerfile
    image: formalscience:jupyter
    container_name: formalscience-jupyter
    
    environment:
      <<: *common-variables
      JUPYTER_ENABLE_LAB: "yes"
      JUPYTER_TOKEN: ""
      JUPYTER_PASSWORD: "sha1:formalscience"
    
    volumes:
      - ../../:/workspace
      - jupyter-data:/root/.local/share/jupyter
    
    ports:
      - "8888:8888"
    
    command: >
      bash -c "
        pip install --no-cache-dir jupyterlab &&
        jupyter lab --ip=0.0.0.0 --port=8888 --no-browser --allow-root
        --NotebookApp.token='' --NotebookApp.password=''
      "
    
    networks:
      - formalscience-network
    
    profiles:
      - jupyter

  # ---------------------------------------------------------------------------
  # 文档构建服务
  # ---------------------------------------------------------------------------
  docs:
    build:
      context: ../..
      dockerfile: docs/Refactor/Dockerfile
    image: formalscience:docs
    container_name: formalscience-docs
    
    volumes:
      - ../../:/workspace
      - docs-output:/workspace/docs/_build
    
    command: >
      bash -c "
        cd /workspace/docs &&
        pip install -r requirements-docs.txt &&
        make html
      "
    
    networks:
      - formalscience-network
    
    profiles:
      - docs

# -----------------------------------------------------------------------------
# 网络配置
# -----------------------------------------------------------------------------
networks:
  formalscience-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
          gateway: 172.28.0.1

# -----------------------------------------------------------------------------
# 卷配置
# -----------------------------------------------------------------------------
volumes:
  formalscience-data:
    driver: local
  formalscience-logs:
    driver: local
  lean-cache:
    driver: local
  cargo-cache:
    driver: local
  pip-cache:
    driver: local
  jupyter-data:
    driver: local
  docs-output:
    driver: local
