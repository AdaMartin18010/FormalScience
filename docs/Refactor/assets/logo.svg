<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景圆形 -->
  <circle cx="100" cy="100" r="90" fill="url(#grad1)"/>
  
  <!-- 内部装饰圆 -->
  <circle cx="100" cy="100" r="70" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  
  <!-- 中心符号 - 代表形式科学 -->
  <g transform="translate(100, 100)">
    <!-- 外层六边形 -->
    <polygon points="0,-50 43.3,-25 43.3,25 0,50 -43.3,25 -43.3,-25" 
             fill="none" stroke="white" stroke-width="4" stroke-linejoin="round"/>
    
    <!-- 内层三角形 - 代表逻辑/数学 -->
    <polygon points="0,-30 26,15 -26,15" 
             fill="url(#grad2)" opacity="0.9"/>
    
    <!-- 中心点 -->
    <circle cx="0" cy="0" r="8" fill="white"/>
  </g>
  
  <!-- 装饰点 -->
  <circle cx="35" cy="50" r="6" fill="rgba(255,255,255,0.6)"/>
  <circle cx="165" cy="50" r="6" fill="rgba(255,255,255,0.6)"/>
  <circle cx="35" cy="150" r="6" fill="rgba(255,255,255,0.6)"/>
  <circle cx="165" cy="150" r="6" fill="rgba(255,255,255,0.6)"/>
</svg>