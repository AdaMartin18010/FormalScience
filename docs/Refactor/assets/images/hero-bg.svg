<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#16213e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow1" cx="30%" cy="30%" r="50%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#667eea;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="glow2" cx="70%" cy="70%" r="50%">
      <stop offset="0%" style="stop-color:#764ba2;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- 主背景 -->
  <rect width="1920" height="1080" fill="url(#heroGrad)"/>
  
  <!-- 光晕效果 -->
  <ellipse cx="576" cy="324" rx="400" ry="300" fill="url(#glow1)"/>
  <ellipse cx="1344" cy="756" rx="350" ry="250" fill="url(#glow2)"/>
  
  <!-- 网格线 -->
  <g stroke="rgba(255,255,255,0.03)" stroke-width="1">
    <line x1="0" y1="108" x2="1920" y2="108"/>
    <line x1="0" y1="216" x2="1920" y2="216"/>
    <line x1="0" y1="324" x2="1920" y2="324"/>
    <line x1="0" y1="432" x2="1920" y2="432"/>
    <line x1="0" y1="540" x2="1920" y2="540"/>
    <line x1="0" y1="648" x2="1920" y2="648"/>
    <line x1="0" y1="756" x2="1920" y2="756"/>
    <line x1="0" y1="864" x2="1920" y2="864"/>
    <line x1="0" y1="972" x2="1920" y2="972"/>
    <line x1="192" y1="0" x2="192" y2="1080"/>
    <line x1="384" y1="0" x2="384" y2="1080"/>
    <line x1="576" y1="0" x2="576" y2="1080"/>
    <line x1="768" y1="0" x2="768" y2="1080"/>
    <line x1="960" y1="0" x2="960" y2="1080"/>
    <line x1="1152" y1="0" x2="1152" y2="1080"/>
    <line x1="1344" y1="0" x2="1344" y2="1080"/>
    <line x1="1536" y1="0" x2="1536" y2="1080"/>
    <line x1="1728" y1="0" x2="1728" y2="1080"/>
  </g>
  
  <!-- 装饰性几何图形 -->
  <polygon points="200,200 250,150 300,200 250,250" fill="none" stroke="rgba(102,126,234,0.2)" stroke-width="2"/>
  <polygon points="1600,800 1650,750 1700,800 1650,850" fill="none" stroke="rgba(118,75,162,0.2)" stroke-width="2"/>
  <circle cx="400" cy="800" r="50" fill="none" stroke="rgba(102,126,234,0.15)" stroke-width="2"/>
  <circle cx="1500" cy="300" r="40" fill="none" stroke="rgba(118,75,162,0.15)" stroke-width="2"/>
  
  <!-- 小点装饰 -->
  <circle cx="100" cy="100" r="3" fill="rgba(102,126,234,0.4)"/>
  <circle cx="1800" cy="200" r="3" fill="rgba(118,75,162,0.4)"/>
  <circle cx="300" cy="900" r="3" fill="rgba(102,126,234,0.4)"/>
  <circle cx="1700" cy="950" r="3" fill="rgba(118,75,162,0.4)"/>
</svg>